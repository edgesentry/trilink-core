name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  create_tag:
    name: Bump version and create tag
    uses: ./.github/workflows/auto-version-tag.yml
    secrets: inherit
    permissions:
      contents: write

  quality_gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: create_tag
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.create_tag.outputs.tag_name }}

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (release)
        run: cargo build --release --locked

      - name: Run tests
        run: cargo test --locked

      - name: Run tests with sqlite feature
        run: cargo test --locked --features sqlite

      - name: Install cargo-deny
        run: cargo deny --version 2>/dev/null || cargo install cargo-deny --locked

      - name: License check
        run: cargo deny --all-features check licenses

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Deny vulnerable advisories
        run: cargo deny check advisories

      - name: Deny policy violations (bans + sources)
        run: cargo deny check bans sources

  publish_crates:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [create_tag, quality_gate]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.create_tag.outputs.tag_name }}

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Login crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "CRATES_IO_TOKEN secret is required for release workflow"
            exit 1
          fi

      - name: Publish trilink-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | python3 -c "import json,sys; data=json.load(sys.stdin); print(data['packages'][0]['version'])")"
          url="https://crates.io/api/v1/crates/trilink-core/${version}"
          if curl --silent --show-error --fail "$url" >/dev/null 2>&1; then
            echo "trilink-core@${version} already exists on crates.io. Skipping."
          else
            echo "Publishing trilink-core@${version} ..."
            cargo publish --locked
          fi

  publish_github_release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [create_tag, publish_crates]
    if: ${{ needs.publish_crates.result == 'success' }}
    permissions:
      contents: write

    steps:
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.create_tag.outputs.tag_name }}
        run: |
          gh release create "${TAG_NAME}" \
            --repo "${{ github.repository }}" \
            --title "${TAG_NAME}" \
            --generate-notes
