[graph]
targets = []

[advisories]
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]
ignore  = []

[bans]
multiple-versions = "warn"
wildcards         = "warn"
highlight         = "all"

[licenses]
private = { ignore = true }
confidence-threshold = 0.8
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",
  "ISC",
]

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
